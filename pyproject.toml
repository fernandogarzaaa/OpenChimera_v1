[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "openchimera"
version = "0.1.0"
description = "Local-first orchestration runtime for OpenChimera"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
openchimera = "run:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["core", "openchimera"]