version: 2
updates:
  # Python runtime and dev dependencies
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      python-runtime:
        patterns:
          - "psutil"
          - "pydantic*"
      python-dev:
        patterns:
          - "pip-tools"
          - "pre-commit"
          - "build"
          - "wheel"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  # npm — playwright-pro MCP integrations
  - package-ecosystem: npm
    directory: "/skills/playwright-pro/integrations/browserstack-mcp"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  - package-ecosystem: npm
    directory: "/skills/playwright-pro/integrations/testrail-mcp"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  - package-ecosystem: npm
    directory: "/skills/engineering-team/playwright-pro/integrations/browserstack-mcp"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  - package-ecosystem: npm
    directory: "/skills/engineering-team/playwright-pro/integrations/testrail-mcp"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3

  # npm — dependency-auditor demo fixture (scan for automated updates)
  - package-ecosystem: npm
    directory: "/skills/dependency-auditor/test-project"
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
